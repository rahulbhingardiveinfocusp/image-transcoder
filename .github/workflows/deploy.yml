name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options: [deploy, destroy]

jobs:
  # =========================================================================
  # 1. APPLICATION COMPILATION & CONTINUOUS DEPLOYMENT (Automatic on Push)
  # =========================================================================
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      # --- BACKEND COMPILE ---
      - name: Build & Push Backend to DockerHub
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest ./backend
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest

      # --- FETCH RUNNING INFRASTRUCTURE IP ---
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Get EC2 Public IP from State
        id: tf_info
        working-directory: ./terraform
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }}
        run: |
          terraform init
          # Fetches the active host IP address securely out of your remote state file
          echo "EC2_IP=$(terraform output -raw server_public_ip)" >> $GITHUB_ENV

      # --- LIVE ROLLING DEPLOY TO EXISTING CONTAINER WORKER STACK ---
      - name: SSH Into EC2 & Pull Latest Images
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ env.EC2_IP }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            sudo docker-compose pull fastapi celery
            sudo docker-compose up -d --force-recreate fastapi celery

  # =========================================================================
  # 2. INFRASTRUCTURE & FRONTEND DEPLOYMENT (Manual Trigger)
  # =========================================================================
  infra:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev 
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- STEP A: PROVISION OR DESTROY INFRASTRUCTURE ---
      - name: Execute Terraform
        id: terraform_step
        working-directory: ./terraform
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }} 
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}   
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_docker_repo: ${{ secrets.DOCKER_REPO }}
        run: |
          terraform init
          if [ "${{ github.event.inputs.action }}" == "deploy" ]; then
            terraform apply -auto-approve
            echo "EC2_IP=$(terraform output -raw server_public_ip)" >> $GITHUB_ENV
          else
            terraform destroy -auto-approve
          fi

      # --- STEP B: BUILD AND CONFIGURE ANGULAR STATIC ASSETS ---
      - name: Setup Node.js Environment (For Frontend Sync)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && env.EC2_IP != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install & Configure Angular App with Dynamic IP
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && env.EC2_IP != ''
        working-directory: ./frontend
        run: |
          npm ci
          echo "Injecting Backend Endpoint URL (http://${{ env.EC2_IP }}:8000) into Angular production config..."
          sed -i 's/BACKEND_API_URL_PLACEHOLDER/http:\/\/'"${{ env.EC2_IP }}":8000/g' src/environments/environment.prod.ts

      - name: Build Production Angular Assets
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && env.EC2_IP != ''
        working-directory: ./frontend
        run: npm run build -- --configuration=production

      # --- STEP C: SYNC OBJECTS TO S3 & EVAPORATE CACHES ---
      - name: Configure AWS Credentials
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && env.EC2_IP != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Frontend Files & Set Anti-Caching Directives
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && env.EC2_IP != ''
        run: |
          # Sync all standard hashed bundle elements
          aws s3 sync ./frontend/dist/*/browser s3://${{ secrets.S3_BUCKET_NAME }}-frontend --delete
          
          # Overwrite index.html explicitly setting headers to force fresh browser synchronization checks
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}-frontend/index.html s3://${{ secrets.S3_BUCKET_NAME }}-frontend/index.html --metadata-directive REPLACE --cache-control "no-cache, no-store, must-revalidate"

      - name: Invalidate CloudFront Cache
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.action == 'deploy' && env.EC2_IP != ''
        run: |
          # Pull down the CDN distribution ID natively from the current Terraform state output
          CLOUDFRONT_DIST_ID=$(cd ./terraform && terraform output -raw frontend_cdn_id || echo "")
          
          if [ ! -z "$CLOUDFRONT_DIST_ID" ] && [ "$CLOUDFRONT_DIST_ID" != "Warning" ]; then
            echo "Purging CloudFront Edge Cache for distribution: $CLOUDFRONT_DIST_ID"
            aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DIST_ID" --paths "/*"
          else
            echo "Skipping Cache Eviction: CloudFront Distribution output not found."
          fi