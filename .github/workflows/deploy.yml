name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options: [deploy, destroy]

jobs:
  # =========================================================================
  # 1. APPLICATION CODE PIPELINE (Only builds and pushes; no SSH connections!)
  # =========================================================================
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4
      
      - name: Build & Push to DockerHub
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest ./backend
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest

  # =========================================================================
  # 2. INFRASTRUCTURE MANAGEMENT
  # =========================================================================
  infra:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev 
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      - name: Execute
        working-directory: ./terraform
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }} 
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}   
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
          # NEW: Passing Docker info to Terraform variables so user data can read them
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_docker_repo: ${{ secrets.DOCKER_REPO }}
        run: |
          terraform init
          if [ "${{ github.event.inputs.action }}" == "deploy" ]; then
            terraform apply -auto-approve
          else
            terraform destroy -auto-approve
          fi