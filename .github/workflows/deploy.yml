name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options: [deploy, destroy]

jobs:
  # =========================================================================
  # 1. APPLICATION COMPILATION (Runs automatically on git push to main)
  # =========================================================================
  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev
    steps:
      - uses: actions/checkout@v4

      # --- BACKEND COMPILE ---
      - name: Build & Push Backend to DockerHub
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest ./backend
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest

      # --- FRONTEND COMPILE ---
      - name: Setup Node.js Environment
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Angular Dependencies
        working-directory: ./frontend
        run: npm ci

      # We build the frontend on push just to verify there are no syntax bugs,
      # but we do not deploy it here because the infrastructure might not exist yet.
      - name: Test Angular Build Configuration
        working-directory: ./frontend
        run: npm run build -- --configuration=production

  # =========================================================================
  # 2. INFRASTRUCTURE & FRONTEND DEPLOYMENT (Manual Switch)
  # =========================================================================
  infra:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev 
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- STEP A: PROVISION INFRASTRUCTURE ---
      - name: Execute Terraform
        working-directory: ./terraform
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }} 
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}   
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_docker_repo: ${{ secrets.DOCKER_REPO }}
        run: |
          terraform init
          if [ "${{ github.event.inputs.action }}" == "deploy" ]; then
            terraform apply -auto-approve
          else
            terraform destroy -auto-approve
          fi

      # --- STEP B: DEPLOY FRONTEND (Only fires if we are deploying, not destroying) ---
      - name: Setup Node.js Environment (For Frontend Sync)
        if: github.event.inputs.action == 'deploy'
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build Production Angular Assets
        if: github.event.inputs.action == 'deploy'
        working-directory: ./frontend
        run: |
          npm ci
          npm run build -- --configuration=production

      - name: Configure AWS Credentials
        if: github.event.inputs.action == 'deploy'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      # FIXED: This now runs right after Terraform Apply, meaning the bucket is guaranteed to exist!
      - name: Deploy Frontend Files to Newly Created Suffix Bucket
        if: github.event.inputs.action == 'deploy'
        run: |
          aws s3 sync ./frontend/dist/*/browser s3://${{ secrets.S3_BUCKET_NAME }}-frontend --delete