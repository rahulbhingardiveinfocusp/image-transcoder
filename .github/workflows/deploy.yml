name: CI/CD Pipeline

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        type: choice
        options: [deploy, destroy]

jobs:
  # =========================================================================
  # 1. AUTOMATIC ON PUSH: Test, Build, and Push Images Only
  # =========================================================================
  build-and-test:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    environment: dev 
    steps:
      - uses: actions/checkout@v4

      # --- STEP A: RUN BACKEND TESTS ---
      - name: Set up Python Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Install Test Dependencies & Run Tests
        run: |
          cd backend
          pip install -r requirements.txt
          # pytest # 👈 Uncomment this when your test suite is ready!

      # --- STEP B: BUILD & PUSH TO DOCKER HUB ---
      - name: Build & Push Backend to DockerHub
        run: |
          docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest ./backend
          echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u ${{ secrets.DOCKERHUB_USERNAME }} --password-stdin
          docker push ${{ secrets.DOCKERHUB_USERNAME }}/${{ secrets.DOCKER_REPO }}:latest

  # =========================================================================
  # 2. MANUAL WORKFLOW DISPATCH: Complete Infrastructure & App Deployment
  # =========================================================================
  deploy-infrastructure:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    environment: dev 
    steps:
      - uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7.0"

      # --- STEP A: PROVISION OR DESTROY AWS CORE ---
      - name: Execute Terraform
        id: terraform_step
        working-directory: ./terraform
        env: 
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION }} 
          TF_VAR_aws_region: ${{ secrets.AWS_REGION }}   
          TF_VAR_s3_bucket_name: ${{ secrets.S3_BUCKET_NAME }}
          TF_VAR_dockerhub_username: ${{ secrets.DOCKERHUB_USERNAME }}
          TF_VAR_docker_repo: ${{ secrets.DOCKER_REPO }}
        run: |
          terraform init
          if [ "${{ github.event.inputs.action }}" == "deploy" ]; then
            terraform apply -auto-approve
            REAL_IP=$(terraform output -raw server_public_ip)
            echo "fetched_ip=$REAL_IP" >> $GITHUB_OUTPUT
          else
            terraform destroy -auto-approve
          fi

      # --- STEP B: CONFIGURE & BUILD ANGULAR WITH THE ACTIVE IP ---
      - name: Setup Node.js Environment
        if: github.event.inputs.action == 'deploy' && steps.terraform_step.outputs.fetched_ip != ''
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compile Frontend Production Bundle
        if: github.event.inputs.action == 'deploy' && steps.terraform_step.outputs.fetched_ip != ''
        working-directory: ./frontend
        run: |
          npm ci
          echo "Injecting Backend Endpoint URL (http://${{ steps.terraform_step.outputs.fetched_ip }}:8000) into Angular production config..."
          sed -i 's#BACKEND_API_URL_PLACEHOLDER#http://'${{ steps.terraform_step.outputs.fetched_ip }}':8000#g' src/environments/environment.prod.ts
          npm run build -- --configuration=production

      # --- STEP C: PUSH STATIC FRONTEND ASSETS TO S3 ---
      - name: Configure AWS Credentials
        if: github.event.inputs.action == 'deploy' && steps.terraform_step.outputs.fetched_ip != ''
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Deploy Frontend Files with Correct MIME Mappings
        if: github.event.inputs.action == 'deploy' && steps.terraform_step.outputs.fetched_ip != ''
        run: |
          aws s3 sync ./frontend/dist/*/browser s3://${{ secrets.S3_BUCKET_NAME }}-frontend --delete
          
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}-frontend/ s3://${{ secrets.S3_BUCKET_NAME }}-frontend/ \
            --exclude "*" --include "*.js" --recursive --metadata-directive REPLACE --content-type "application/javascript"
            
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}-frontend/ s3://${{ secrets.S3_BUCKET_NAME }}-frontend/ \
            --exclude "*" --include "*.css" --recursive --metadata-directive REPLACE --content-type "text/css"
            
          aws s3 cp s3://${{ secrets.S3_BUCKET_NAME }}-frontend/index.html s3://${{ secrets.S3_BUCKET_NAME }}-frontend/index.html \
            --metadata-directive REPLACE --content-type "text/html" --cache-control "no-cache, no-store, must-revalidate"

      # --- STEP D: PURGE THE CLOUDFRONT CACHE ---
      - name: Invalidate CloudFront Cache
        if: github.event.inputs.action == 'deploy' && steps.terraform_step.outputs.fetched_ip != ''
        run: |
          CLOUDFRONT_DIST_ID=$(cd ./terraform && terraform output -raw frontend_cdn_id || echo "")
          if [ ! -z "$CLOUDFRONT_DIST_ID" ] && [ "$CLOUDFRONT_DIST_ID" != "Warning" ]; then
            aws cloudfront create-invalidation --distribution-id "$CLOUDFRONT_DIST_ID" --paths "/*"
          fi

      # --- STEP E: TELL EC2 WORKER TO RUN THE NEW IMAGE ---
      - name: SSH & Refresh Live Docker Containers
        uses: appleboy/ssh-action@v1.0.3
        if: github.event.inputs.action == 'deploy' && steps.terraform_step.outputs.fetched_ip != ''
        with:
          host: ${{ steps.terraform_step.outputs.fetched_ip }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd /home/ubuntu/app
            sudo docker-compose pull fastapi celery
            sudo docker-compose up -d --force-recreate fastapi celery